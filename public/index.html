<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
      integrity="sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class="min-h-screen bg-linear-to-b from-blue-400 to-sky-400 dark:bg-linear-to-b dark:from-black dark:to-gray-900 transition-colors duration-300 ease-in"
  >
    <!-- Header Elements -->
    <header
      class="p-2.5 pb-5 flex flex-col rounded-br-2xl rounded-bl-2xl shadow-[1px_3px_10px_rgba(0,0,0,0.60)] dark:shadow-[1px_3px_10px_rgba(0,40,100,0.60)] transition-shadow duration-300 ease-in"
    >
      <div class="mb-8 flex justify-between items-center">
        <!-- Logo -->
        <h1 class="text-4xl font-bold text-white text-shadow-sm">
          Sky<span
            class="text-amber-500 dark:text-blue-700 transition-all duration-300 ease-in"
            >Cast</span
          >
        </h1>

        <!-- Theme Toggle -->
        <div
          id="toggleBtn"
          class="w-10 h-5 bg-gray-50 rounded-3xl relative cursor-pointer dark:bg-blue-700 transition-colors duration-300 ease-in"
        >
          <div
            id="toggle"
            class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 dark:left-5.5 flex items-center justify-center shadow-[0_0_2px_2px_rgba(0,0,0,0.30)] transition-all duration-300 ease-linear"
          >
            <i class="fa-solid fa-sun text-xs text-amber-500"></i>
          </div>
        </div>
      </div>

      <!-- Search Input -->
      <form
        id="form"
        class="px-2.5 p-1 flex items-center gap-2 bg-white w-full max-w-100 rounded-3xl cursor-pointer"
      >
        <span class="material-symbols-outlined text-gray-500"> search </span>
        <input
          type="search"
          name="search"
          id="searchInput"
          class="outline-0 flex-1 text-gray-800"
        />
      </form>
    </header>

    <!-- Weather Data Display -->
    <main
      class="py-5 px-2.5 flex flex-col gap-2.5 justify-center items-center sm:px-10 md:px-20"
    ></main>

    <!-- Loading Spinner -->
    <div class="spinner hidden"></div>

    <script type="module" src="javascript/script.js"></script>
  </body>
</html>
